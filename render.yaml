services:
  - type: web
    name: student-placement-system
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn placement_portal.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DATABASE_URL
        fromDatabase:
          name: student-placement-db
          property: connectionString

databases:
  - name: student-placement-db
    plan: free
